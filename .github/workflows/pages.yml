name: Deploy GitHub Pages

# Publica la pagina demo en GitHub Pages en cada push a main.
# La pagina es estatica; la busqueda corre del lado del cliente (datos de ejemplo).

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'scripts/build-pages.js'
      - 'src/**'
      - 'ejemplos/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Construir sitio estatico (con fuentes reales)
        run: node scripts/build-pages.js
        env:
          HABILITAR_FUENTES_REALES: '1'
      - name: Configurar Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: sitio

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar en Pages
        id: deployment
        uses: actions/deploy-pages@v4
