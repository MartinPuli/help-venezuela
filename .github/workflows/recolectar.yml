name: Recolectar y cruzar fuentes

# Workflow PROGRAMADO: reune los datos de todas las fuentes cada X tiempo,
# los cruza/deduplica y commitea el feed unificado y redactado en publico/.
#
# A publico/ solo va informacion redactada (ver scripts/recolectar.js).
# Los datos crudos (datos/) estan en .gitignore y NO se commitean.

on:
  schedule:
    # Cada 15 minutos. GitHub puede retrasar los cron bajo carga; el minimo
    # practico es ~5 min. Ajusta el intervalo segun haga falta.
    - cron: '*/15 * * * *'
  workflow_dispatch: {} # permite correrlo a mano desde la pestaña Actions
  push:
    branches: [main]
    paths:
      - 'personas/**'
      - 'fuentes/**'
      - 'src/**'
      - 'scripts/recolectar.js'

# No solapar ejecuciones.
concurrency:
  group: recolectar
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  recolectar:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Recolectar y cruzar
        run: node scripts/recolectar.js

      - name: Commitear feed unificado si cambio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add publico/
          if git diff --staged --quiet; then
            echo "Sin cambios en el feed."
          else
            git commit -m "datos: actualizar feed unificado de desaparecidos [skip ci]"
            git push
          fi
